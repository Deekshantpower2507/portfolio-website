<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRANSFORM</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        .box1 {
            margin: 25px;
            border: 2px solid red;
            height: 30px;
            display: flex;
            bottom: 60px;
            transform: rotate(285deg)
        }

        .box2 {
            margin: 25px;
            border: 2px solid rgba(230, 22, 182, 0.96);
            transform: scale(1.1);
            height: 30px;
        }

        .box3 {
            margin: 25px;
            border: 2px solid green;
            height: 30px;
            transform: skew(45deg);
        }

        .box4 {
            border: 2px solid gray;
            height: 30px;
            transform: translate(50%);
        }
    </style>
</head>

<body>
    <div class="box1">THIS IS</div>
    <div class="box2"> DEEKSHANT</div>
    <div class="box3"> SHARMA</div>
    <div class="box4"> HERO</div>


</body>

</html>
