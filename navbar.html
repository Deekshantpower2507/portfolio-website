<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web nav</title>
    <style>
        .box ul {
            display: flex;
            gap: 45px;
            justify-content: flex-end;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            height: 50px;
            margin: 0px;
            padding: 0px;
            border: 1px solid black;
            list-style: none;
            


        }

        .logo {
            margin: 0px;
            padding: 0px;
            display: flex;
            position:absolute;
            top: 1px;
            
            align-items: flex-start;
            height: 50px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="box">
                <ul>
                    <li>
                        resources
                    </li>
                    <li>prices </li>
                    <li>products</li>
                    <li>about us</li>

                </ul>
                <div class="logo">
                    <img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE_Site-Logo.png" alt="" width="150" >
                    

                </div>
            </div>
        </nav>

    </header>
</body>

</html>
